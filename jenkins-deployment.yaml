apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts
        ports:
        - containerPort: 8080
        - containerPort: 50000
        volumeMounts:
        - name: docker-socket
          mountPath: /var/run/docker.sock
        - name: kubectl
          mountPath: /usr/local/bin/kubectl
        - name: kube-config
          mountPath: /root/.kube
      volumes:
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
      - name: kubectl
        hostPath:
          path: /usr/local/bin/kubectl
      - name: kube-config
        hostPath:
          path: /home/zaarahirani/.kube
